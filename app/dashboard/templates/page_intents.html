<!-- Intents Table Section -->
<div id="intents-page" class="page-content" style="display: none;">
    <!-- Intents Table Section -->
    <div class="grid-x grid-margin-x">
        <div class="cell medium-8">
            <h3 class="section-title">New Intents</h3>
            <form id="intents-form" action="/" method="post">
                <div class="grid-x grid-margin-x">
                    <div class="medium-6 cell">
                        <label for="intent-type">Intent Type</label>
                        <select id="intent-type" name="intent_type">
                            <option value="prevention">Prevent</option>
                            <option value="mitigation">Mitigate</option>
                        </select>
                    </div>

                    <div class="medium-6 cell">
                        <label for="threat-selector">Threat</label>
                        <select id="threat-selector" name="threat-selector">

                        </select>
                    </div>

                    <div class="medium-6 cell">
                        <label for="host">Host</label>
                        <input type="text" id="host" name="host" placeholder="Host or list of hosts">
                    </div>

                    <div class="medium-6 cell">
                        <label for="duration">Duration (seconds)</label>
                        <input type="number" id="duration" name="duration" value="600">
                    </div>

                    <div class="small-12 medium-12 cell text-center">
                        <button type="submit" id="submit-intent" class="button expand">Send</button>
                    </div>
                </div>
            </form>
        </div>

        <div class="cell medium-12">
            <h3 class="section-title">Active Intents</h3>
            <div class="table-container">
                <table class="hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Description</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Expires</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="intent-management-table-body">
                        <tr>
                            <td colspan="7" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>
